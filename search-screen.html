<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>KFC Menu Search Screen</title>
  <style>
    @font-face {
      font-family: "Kentucky Fried Sans";
      src: url("fonts/Kentucky Fried Sans/WOFF/KentuckyFriedSans-Regular.woff2") format("woff2");
      font-weight: 400;
      font-style: normal;
    }

    :root {
      --bg: #f7f0e8;
      --frame: linear-gradient(180deg, #efe5dc 0%, #d9cec3 100%);
      --frame-line: rgba(66, 40, 30, 0.12);
      --text: #111111;
      --muted: #8f8f8f;
      --line: #e7e7e7;
      --field-line: #e4e4e4;
      --focus: #5872d8;
      --white: #ffffff;
      --shadow: 0 24px 60px rgba(71, 47, 36, 0.18);
      --font-ui: "Kentucky Fried Sans", "Helvetica Neue", Arial, sans-serif;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(228, 0, 43, 0.06), transparent 22%),
        radial-gradient(circle at bottom right, rgba(255, 191, 91, 0.08), transparent 20%),
        var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      padding: 16px;
    }

    .stage {
      min-height: calc(100vh - 32px);
      min-height: calc(100dvh - 32px);
      display: grid;
      place-items: center;
    }

    .shell-frame {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      flex-wrap: wrap;
    }

    .phone-wrap {
      position: relative;
      width: min(390px, calc(100vw - 32px));
      height: min(844px, calc(100vh - 32px));
      height: min(844px, calc(100dvh - 32px));
      padding: 12px;
      border-radius: 54px;
      background: var(--frame);
      border: 1px solid var(--frame-line);
      box-shadow: var(--shadow);
    }

    .phone-wrap::before {
      content: "";
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: 124px;
      height: 30px;
      border-radius: 999px;
      background: #dad0c7;
      z-index: 4;
    }

    .phone {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border-radius: 42px;
      background: var(--white);
    }

    .status-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 3;
      height: 52px;
      padding: 18px 22px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: rgba(17, 17, 17, 0.88);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    .viewport {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--white);
    }

    .search-nav {
      flex-shrink: 0;
      min-height: 68px;
      padding: 58px 16px 16px;
      border-bottom: 1px solid #dfdfdf;
      display: grid;
      grid-template-columns: 40px 1fr 40px;
      align-items: center;
      background: var(--white);
    }

    .nav-icon {
      width: 24px;
      height: 24px;
      color: #111111;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      justify-self: start;
    }

    .nav-icon.right {
      justify-self: end;
    }

    .nav-icon svg {
      width: 24px;
      height: 24px;
      display: block;
    }

    .search-title {
      text-align: center;
      font-size: 18px;
      line-height: 1;
      font-weight: 500;
      letter-spacing: -0.02em;
    }

    .content {
      flex: 1;
      padding: 24px 24px 40px;
      background: var(--white);
      overflow: hidden;
    }

    .search-field {
      position: relative;
      height: 56px;
      border: 1px solid var(--field-line);
      background: var(--white);
      display: flex;
      align-items: center;
      padding: 0 50px 0 16px;
    }

    .search-field.active {
      border-color: var(--focus);
    }

    .field-stack {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 2px;
      min-width: 0;
    }

    .field-single {
      display: flex;
      align-items: center;
      min-width: 0;
      height: 100%;
    }

    .field-label,
    .field-placeholder,
    .field-value,
    .helper-text,
    .suggestions-title,
    .suggestion-name {
      letter-spacing: -0.02em;
    }

    .field-label {
      font-size: 12px;
      line-height: 1;
      color: #757575;
      font-weight: 600;
    }

    .field-placeholder {
      font-size: 18px;
      line-height: 1;
      color: #707070;
      font-weight: 700;
      white-space: nowrap;
    }

    .field-value {
      font-size: 18px;
      line-height: 1;
      color: #111111;
      font-weight: 700;
      white-space: nowrap;
    }

    .field-clear {
      position: absolute;
      top: 50%;
      right: 14px;
      transform: translateY(-50%);
      width: 24px;
      height: 24px;
      color: #111111;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .field-clear svg {
      width: 24px;
      height: 24px;
      display: block;
    }

    .helper-text {
      margin-top: 8px;
      font-size: 14px;
      line-height: 1.2;
      color: var(--muted);
      font-weight: 400;
    }

    .suggestions-title {
      margin-top: 24px;
      font-size: 18px;
      line-height: 1.2;
      color: #111111;
      font-weight: 700;
    }

    .suggestions-list {
      margin-top: 12px;
      border-top: 1px solid transparent;
    }

    .suggestion-row {
      min-height: 72px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 0 6px 16px;
      border-bottom: 1px solid var(--line);
    }

    .suggestion-thumb {
      width: 60px;
      height: 60px;
      border-radius: 8px;
      object-fit: cover;
      object-position: center 30%;
      flex-shrink: 0;
    }

    .suggestion-name {
      font-size: 18px;
      line-height: 1.2;
      font-weight: 700;
      color: #111111;
    }

    .home-indicator {
      position: absolute;
      left: 50%;
      bottom: 10px;
      transform: translateX(-50%);
      width: 146px;
      height: 5px;
      border-radius: 999px;
      background: #000000;
    }

    @media (max-width: 840px) {
      .shell-frame {
        gap: 20px;
      }

      .phone-wrap {
        height: auto;
        aspect-ratio: 390 / 844;
      }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="shell-frame">
      <section class="phone-wrap" aria-label="Search empty state">
        <div class="phone">
          <div class="status-bar">
            <span>9:41</span>

          <div class="viewport">

              <span class="nav-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M14.5 5.5L8 12L14.5 18.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>

              <span class="nav-icon right" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M6 6L18 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                  <path d="M18 6L6 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>

              </span>

            <main class="content">
              <div class="search-field">
                <div class="field-single">
                  <span class="field-placeholder">Search Menu</span>

                <span class="field-clear" aria-hidden="true">

                    <path d="M18 6L6 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                  </svg>
                </span>
              </div>
              <p class="helper-text">Helper text</p>
            </main>
          </div>

          <div class="home-indicator"></div>
        </div>
      </section>

      <section class="phone-wrap" aria-label="Search active state">
        <div class="phone">

            <span>9:41</span>

                  <path d="M6 6L18 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                  <path d="M18 6L6 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
              </span>

            <main class="content">
              <div class="search-field active">
                <div class="field-stack">
                  <span class="field-label">Search Menu</span>
                  <span class="field-value">Burger</span>

                <span class="field-clear" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

              <p class="helper-text">Helper text</p>

              <h2 class="suggestions-title">Suggestions</h2>
              <div class="suggestions-list">
                <div class="suggestion-row">

                  <span class="suggestion-name">Zinger Burger</span>

                  <span class="suggestion-name">Zinger Burger</span>

                  <span class="suggestion-name">Zinger Burger</span>

          <div class="home-indicator"></div>

      </section>
    </div>
  </div>
</body>
</html>
