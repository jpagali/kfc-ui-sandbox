<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KFC — Log In / Sign Up</title>
  <style>

    @font-face {
      font-family: "Kentucky Fried Sans";
      src: url("fonts/kfc/KentuckyFriedSans-Regular.ttf") format("truetype");
      font-weight: 400; font-style: normal;
    }
    @font-face {
      font-family: "Kentucky Fried Sans";
      src: url("fonts/kfc/KentuckyFriedSans-Semibold.ttf") format("truetype");
      font-weight: 600; font-style: normal;
    }
    @font-face {
      font-family: "Kentucky Fried Serif";
      src: url("fonts/kfc/KentuckyFriedSerif-BlackItalic.ttf") format("truetype");
      font-weight: 800 900; font-style: italic;
    }

    :root {
      --red:    #e4002b;
      --bg:     #ffffff;
      --text:   #1a1a1a;
      --muted:  #888888;
      --line:   #e5e5e5;
      --radius: 12px;
      --font-display: "Kentucky Fried Serif", Georgia, serif;
      --font-body:    "Kentucky Fried Sans", -apple-system, "Helvetica Neue", sans-serif;
      --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    button, input { font: inherit; border: 0; background: transparent; cursor: pointer; }
    input:focus { outline: none; }

    /* ── Stage ───────────────────────────────────── */
    html, body {
      min-height: 100%;
      background: #f0ede8;
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }

    .stage {
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: clamp(8px, 2vw, 24px);
    }

    /* ── Phone Shell ─────────────────────────────── */
    .phone-wrap {
      position: relative;
      width: min(375px, calc(100vw - 16px));
      height: min(843px, calc(100vh - 16px));
      height: min(843px, calc(100dvh - 16px));
      border-radius: 54px;
      padding: 12px;
      background: linear-gradient(180deg, #efe5dc 0%, #d9cec3 100%);
      box-shadow: 0 30px 80px rgba(71, 47, 36, 0.25);
      border: 1px solid rgba(66, 40, 30, 0.12);
    }

    .phone-wrap::before {
      content: "";
      position: absolute;
      top: 18px; left: 50%;
      transform: translateX(-50%);
      width: 120px; height: 30px;
      border-radius: 999px;
      background: #dad0c7;
      z-index: 30;
    }

    .phone {
      position: relative;
      width: 100%; height: 100%;
      overflow: hidden;
      border-radius: 42px;
      background: #ffffff;
    }

    /* ── Status Bar ──────────────────────────────── */
    .status-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 25;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 22px 0;
      height: 52px;
      color: rgba(35, 24, 21, 0.86);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    /* ── Viewport ────────────────────────────────── */
    .viewport {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ── Screen Nav Bar ──────────────────────────── */
    .screen-nav {
      flex-shrink: 0;
      padding: 58px 20px 0;
      height: 96px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }

    .screen-nav__back {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text);
      font-size: 20px;
      opacity: 0.6;
    }

    .screen-nav__title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .screen-nav__close {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text);
      font-size: 18px;
      opacity: 0.5;
    }

    /* ── Scrollable Content ───────────────────────── */
    .screen-content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: 28px 24px 24px;
      scrollbar-width: none;
    }
    .screen-content::-webkit-scrollbar { display: none; }

    /* ── Heading ─────────────────────────────────── */
    .screen-heading {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 900;
      font-style: italic;
      text-transform: uppercase;
      color: var(--text);
      line-height: 1;
      margin-bottom: 8px;
    }

    .screen-sub {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 28px;
      line-height: 1.4;
    }

    /* ── Input ───────────────────────────────────── */
    .input-wrap {
      position: relative;
      margin-bottom: 16px;
    }

    .input-wrap input {
      width: 100%;
      height: 52px;
      border: 1.5px solid var(--line);
      border-radius: var(--radius);
      padding: 0 16px;
      font-size: 15px;
      color: var(--text);
      background: #ffffff;
      transition: border-color 0.15s var(--ease);
    }

    .input-wrap input:focus {
      border-color: var(--text);
    }

    .input-wrap input::placeholder {
      color: var(--muted);
    }

    .input-wrap input.has-value {
      border-color: var(--text);
    }

    /* Phone input with country code */
    .phone-input-wrap {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .country-code {
      height: 52px;
      padding: 0 12px;
      border: 1.5px solid var(--line);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 15px;
      color: var(--text);
      white-space: nowrap;
      flex-shrink: 0;
      background: #fafafa;
    }

    .country-code svg {
      width: 14px; height: 14px;
      opacity: 0.5;
    }

    .phone-input-wrap input {
      flex: 1;
      height: 52px;
      border: 1.5px solid var(--line);
      border-radius: var(--radius);
      padding: 0 16px;
      font-size: 15px;
      color: var(--text);
      background: #ffffff;
      transition: border-color 0.15s var(--ease);
    }

    .phone-input-wrap input:focus {
      border-color: var(--text);
    }

    .phone-input-wrap input::placeholder { color: var(--muted); }

    /* ── Social divider ──────────────────────────── */
    .social-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
    }

    .social-divider__line {
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    .social-divider__label {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── Social Buttons ──────────────────────────── */
    .social-btns {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 8px;
    }

    .social-btn {
      width: 52px; height: 52px;
      border: 1.5px solid var(--line);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      transition: border-color 0.15s, background 0.15s;
    }

    .social-btn:active { background: #f5f5f5; }

    .social-btn svg { width: 22px; height: 22px; }

    /* ── Primary CTA ─────────────────────────────── */
    .cta-footer {
      flex-shrink: 0;
      padding: 16px 24px;
      background: #ffffff;
      border-top: 1px solid var(--line);
    }

    .cta-btn {
      width: 100%;
      height: 52px;
      border-radius: var(--radius);
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 900;
      font-style: italic;
      text-transform: uppercase;
      letter-spacing: 0.01em;
      color: #ffffff;
      background: var(--red);
      border: 0;
      cursor: pointer;
      transition: opacity 0.15s var(--ease), transform 0.15s var(--ease);
    }

    .cta-btn:disabled {
      background: #d9d9d9;
      color: rgba(255,255,255,0.7);
      cursor: default;
    }

    .cta-btn:not(:disabled):active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    /* ── OTP Dots ────────────────────────────────── */
    .otp-display {
      font-family: var(--font-display);
      font-size: 42px;
      font-weight: 900;
      font-style: italic;
      color: var(--text);
      letter-spacing: 6px;
      text-align: center;
      padding: 20px 0 8px;
      min-height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .otp-dots {
      display: flex;
      gap: 12px;
      justify-content: center;
      padding: 20px 0 8px;
    }

    .otp-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--line);
      border: 2px solid #cccccc;
      transition: background 0.15s, border-color 0.15s;
    }

    .otp-dot.filled {
      background: var(--text);
      border-color: var(--text);
    }

    .otp-timer {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 16px;
    }

    .otp-links {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .otp-link {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    /* Hidden real OTP input */
    .otp-hidden-input {
      position: absolute;
      opacity: 0;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }

    /* ── Create Account Form ─────────────────────── */
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-group input {
      width: 100%;
      height: 52px;
      border: 1.5px solid var(--line);
      border-radius: var(--radius);
      padding: 0 16px;
      font-size: 15px;
      color: var(--text);
      background: #ffffff;
      transition: border-color 0.15s;
    }

    .form-group input:focus { border-color: var(--text); }
    .form-group input::placeholder { color: var(--muted); }
    .form-group input:read-only { background: #fafafa; color: var(--muted); }

    .form-required { color: var(--red); }

    .checkbox-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-top: 8px;
    }

    .checkbox-row input[type="checkbox"] {
      width: 20px; height: 20px;
      flex-shrink: 0;
      margin-top: 2px;
      accent-color: var(--red);
      cursor: pointer;
    }

    .checkbox-row label {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      cursor: pointer;
    }

    .checkbox-row label a {
      color: var(--text);
      font-weight: 600;
    }

    /* ── Screens ─────────────────────────────────── */
    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      background: #ffffff;
      transition: opacity 0.22s var(--ease), transform 0.22s var(--ease);
    }

    .screen.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateX(24px);
    }

    /* ── Home Bar ────────────────────────────────── */
    .home-bar {
      height: 34px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .home-bar__pill {
      width: 134px; height: 5px;
      background: rgba(0,0,0,0.15);
      border-radius: 999px;
    }

  </style>
</head>
<body>

<div class="stage">
  <div class="phone-wrap">
    <div class="phone">
      <div class="status-bar">
        <span>9:41</span>
        <span>5G ▰▰▰ 🔋</span>
      </div>

      <div class="viewport" style="position:relative; overflow:hidden;">

        <!-- ══ Screen 1: Phone Entry ══ -->
        <div class="screen" id="screen-phone">
          <div class="screen-nav">
            <button class="screen-nav__back" aria-label="Back">←</button>
            <span class="screen-nav__title">Log In / Sign up</span>
            <button class="screen-nav__close" aria-label="Close">✕</button>
          </div>

          <div class="screen-content">
            <h1 class="screen-heading">Log In /<br>Sign Up</h1>
            <p class="screen-sub">Please enter your phone number.</p>

            <div class="phone-input-wrap">
              <div class="country-code">
                🇦🇺 +61
                <svg viewBox="0 0 14 14" fill="none">
                  <path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <input
                type="tel"
                id="phone-input"
                placeholder="Phone Number"
                inputmode="numeric"
                maxlength="10"
              />
            </div>

            <div class="social-divider">
              <div class="social-divider__line"></div>
              <span class="social-divider__label">Or log in with</span>
              <div class="social-divider__line"></div>
            </div>

            <div class="social-btns">
              <!-- Google -->
              <button class="social-btn" aria-label="Continue with Google">
                <svg viewBox="0 0 24 24">
                  <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                  <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                  <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                  <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
              </button>
              <!-- Apple -->
              <button class="social-btn" aria-label="Continue with Apple">
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
                </svg>
              </button>
              <!-- Facebook -->
              <button class="social-btn" aria-label="Continue with Facebook">
                <svg viewBox="0 0 24 24" fill="#1877F2">
                  <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="cta-footer">
            <button class="cta-btn" id="btn-signin" disabled>Sign In</button>
          </div>
          <div class="home-bar"><div class="home-bar__pill"></div></div>
        </div>

        <!-- ══ Screen 2: OTP Verification ══ -->
        <div class="screen hidden" id="screen-otp">
          <div class="screen-nav">
            <button class="screen-nav__back" id="otp-back" aria-label="Back">←</button>
            <span class="screen-nav__title">Log In / Sign up</span>
            <button class="screen-nav__close" aria-label="Close">✕</button>
          </div>

          <div class="screen-content">
            <h1 class="screen-heading">Log In /<br>Sign Up</h1>
            <p class="screen-sub" id="otp-sub">We just sent you an SMS to ·· ·· ··· 000.</p>

            <!-- Hidden input to capture keystrokes -->
            <input class="otp-hidden-input" id="otp-hidden" type="tel" inputmode="numeric" maxlength="6" autocomplete="one-time-code"/>

            <!-- OTP dots or revealed code -->
            <div class="otp-dots" id="otp-dots">
              <div class="otp-dot" id="d0"></div>
              <div class="otp-dot" id="d1"></div>
              <div class="otp-dot" id="d2"></div>
              <div class="otp-dot" id="d3"></div>
              <div class="otp-dot" id="d4"></div>
              <div class="otp-dot" id="d5"></div>
            </div>

            <p class="otp-timer" id="otp-timer">Code expires in 2:41</p>

            <div class="otp-links">
              <button class="otp-link">Resend Code</button>
              <button class="otp-link" id="btn-diff-number">Different Number?</button>
            </div>
          </div>

          <div class="cta-footer">
            <button class="cta-btn" id="btn-submit" disabled>Submit</button>
          </div>
          <div class="home-bar"><div class="home-bar__pill"></div></div>
        </div>

        <!-- ══ Screen 3: Create Account ══ -->
        <div class="screen hidden" id="screen-signup">
          <div class="screen-nav">
            <button class="screen-nav__back" id="signup-back" aria-label="Back">←</button>
            <span class="screen-nav__title">Sign Up</span>
            <button class="screen-nav__close" aria-label="Close">✕</button>
          </div>

          <div class="screen-content">
            <h1 class="screen-heading">Create<br>Account</h1>
            <p class="screen-sub">Fields marked with an asterisk (*) are required.</p>

            <div class="form-group">
              <input type="text" id="first-name" placeholder="Enter First Name *" />
            </div>

            <div class="form-group">
              <input type="text" id="last-name" placeholder="Enter Last Name" />
            </div>

            <div class="form-group">
              <input type="tel" id="phone-prefilled" placeholder="Phone Number *" readonly />
            </div>

            <div class="form-group">
              <input type="email" id="email" placeholder="Enter Email Address *" />
            </div>

            <div class="form-group">
              <input type="date" id="dob" placeholder="Enter Date of Birth" />
            </div>

            <div class="form-group">
              <input type="text" id="loyalty" placeholder="Message about loyalty program" />
            </div>

            <div class="checkbox-row">
              <input type="checkbox" id="terms" />
              <label for="terms">
                I agree to the <a href="#">Terms of Use</a> and understand that the information will be passed on as described in the <a href="#">Privacy Policy</a>.
              </label>
            </div>
          </div>

          <div class="cta-footer">
            <button class="cta-btn" id="btn-create" disabled>Create Account</button>
          </div>
          <div class="home-bar"><div class="home-bar__pill"></div></div>
        </div>

      </div><!-- /viewport -->
    </div><!-- /phone -->
  </div><!-- /phone-wrap -->
</div><!-- /stage -->

<script>
  /* ── Helpers ─────────────────────────────────────────── */
  function show(id) {
    document.querySelectorAll(".screen").forEach(s => {
      s.classList.toggle("hidden", s.id !== id);
    });
  }

  /* ── Screen 1: Phone Entry ───────────────────────────── */
  const phoneInput = document.getElementById("phone-input");
  const btnSignin  = document.getElementById("btn-signin");
  const otpSub     = document.getElementById("otp-sub");
  const phonePrefilled = document.getElementById("phone-prefilled");

  phoneInput.addEventListener("input", () => {
    const val = phoneInput.value.replace(/\D/g, "");
    phoneInput.value = val;
    btnSignin.disabled = val.length < 8;
  });

  btnSignin.addEventListener("click", () => {
    const num = phoneInput.value;
    const masked = "·· ·· ··· " + num.slice(-3);
    otpSub.textContent = "We just sent you an SMS to " + masked + ".";
    phonePrefilled.value = "+61 " + num;
    startOTP();
    show("screen-otp");
    setTimeout(() => document.getElementById("otp-hidden").focus(), 200);
  });

  /* ── Screen 2: OTP ───────────────────────────────────── */
  const otpHidden  = document.getElementById("otp-hidden");
  const btnSubmit  = document.getElementById("btn-submit");
  const dots       = [0,1,2,3,4,5].map(i => document.getElementById("d" + i));
  let   otpValue   = "";
  let   timerInterval;

  function startOTP() {
    otpValue = "";
    otpHidden.value = "";
    dots.forEach(d => d.classList.remove("filled"));
    btnSubmit.disabled = true;
    startTimer(2 * 60 + 41);
  }

  function startTimer(seconds) {
    clearInterval(timerInterval);
    const timerEl = document.getElementById("otp-timer");
    timerInterval = setInterval(() => {
      if (seconds <= 0) { clearInterval(timerInterval); timerEl.textContent = "Code expired"; return; }
      seconds--;
      const m = Math.floor(seconds / 60);
      const s = String(seconds % 60).padStart(2, "0");
      timerEl.textContent = "Code expires in " + m + ":" + s;
    }, 1000);
  }

  otpHidden.addEventListener("input", () => {
    otpValue = otpHidden.value.replace(/\D/g, "").slice(0, 6);
    otpHidden.value = otpValue;
    dots.forEach((d, i) => d.classList.toggle("filled", i < otpValue.length));
    btnSubmit.disabled = otpValue.length < 6;
  });

  // Tap on dots area focuses hidden input
  document.getElementById("otp-dots").addEventListener("click", () => {
    otpHidden.focus();
  });

  document.getElementById("otp-back").addEventListener("click", () => {
    clearInterval(timerInterval);
    show("screen-phone");
  });

  document.getElementById("btn-diff-number").addEventListener("click", () => {
    clearInterval(timerInterval);
    show("screen-phone");
  });

  btnSubmit.addEventListener("click", () => {
    clearInterval(timerInterval);
    // New user → show Create Account; existing user → would go home
    show("screen-signup");
  });

  /* ── Screen 3: Create Account ────────────────────────── */
  const firstNameInput = document.getElementById("first-name");
  const emailInput     = document.getElementById("email");
  const termsCheck     = document.getElementById("terms");
  const btnCreate      = document.getElementById("btn-create");

  function validateCreate() {
    btnCreate.disabled = !(
      firstNameInput.value.trim() &&
      emailInput.value.trim() &&
      termsCheck.checked
    );
  }

  firstNameInput.addEventListener("input", validateCreate);
  emailInput.addEventListener("input", validateCreate);
  termsCheck.addEventListener("change", validateCreate);

  document.getElementById("signup-back").addEventListener("click", () => {
    show("screen-otp");
    setTimeout(() => otpHidden.focus(), 200);
  });

  btnCreate.addEventListener("click", () => {
    // Success — would navigate to home
    alert("Account created! Welcome to KFC.");
  });
</script>

</body>
</html>
