<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KFC Boilerplate — Pay Now</title>
  <style>

    @font-face {
      font-family: "Kentucky Fried Sans";
      src: url("fonts/KentuckyFriedSans-Regular.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: "Kentucky Fried Sans";
      src: url("fonts/KentuckyFriedSans-Semibold.ttf") format("truetype");
      font-weight: 600;
      font-style: normal;
    }
    @font-face {
      font-family: "Kentucky Fried Serif";
      src: url("fonts/KentuckyFriedSerif-ExtraboldItalic.ttf") format("truetype");
      font-weight: 700 800;
      font-style: italic;
    }
    @font-face {
      font-family: "Kentucky Fried Serif";
      src: url("fonts/KentuckyFriedSerif-BlackItalic.ttf") format("truetype");
      font-weight: 900;
      font-style: italic;
    }

    :root {
      --bg:        #080808;
      --panel:     #121212;
      --panel-2:   #1b1b1b;
      --panel-3:   #252525;
      --line:      rgba(255, 255, 255, 0.08);
      --text:      #fff8f1;
      --muted:     rgba(255, 248, 241, 0.60);
      --red:       #e4002b;
      --red-soft:  rgba(228, 0, 43, 0.18);
      --gold:      #ffbf5b;
      --green:     #52d890;
      --shadow:    0 30px 80px rgba(0, 0, 0, 0.55);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --font-display: "Kentucky Fried Serif", Georgia, serif;
      --font-body:    "Kentucky Fried Serif", Georgia, serif;
      --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    html[data-theme="light"] {
      --bg:       #f6efe8;
      --panel:    #fff9f3;
      --panel-2:  #f4ece4;
      --panel-3:  #ede2d8;
      --line:     rgba(66, 40, 30, 0.10);
      --text:     #231815;
      --muted:    rgba(35, 24, 21, 0.60);
      --red-soft: rgba(228, 0, 43, 0.08);
      --shadow:   0 24px 60px rgba(71, 47, 36, 0.18);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    button, input { font: inherit; border: 0; cursor: pointer; }

    html, body {
      min-height: 100%;
      overflow-x: hidden;
      background:
        radial-gradient(circle at top left, rgba(228, 0, 43, 0.14), transparent 22%),
        radial-gradient(circle at bottom right, rgba(255, 191, 91, 0.10), transparent 20%),
        #050505;
      font-family: var(--font-body);
      font-style: italic;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    html[data-theme="light"] body {
      background:
        radial-gradient(circle at top left, rgba(228, 0, 43, 0.08), transparent 22%),
        radial-gradient(circle at bottom right, rgba(255, 191, 91, 0.08), transparent 20%),
        #f7f0e8;
    }

    .stage {
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: clamp(8px, 2vw, 24px);
    }

    .phone-wrap {
      position: relative;
      width: min(390px, calc(100vw - 16px));
      height: min(844px, calc(100vh - 16px));
      height: min(844px, calc(100dvh - 16px));
      border-radius: 54px;
      padding: 12px;
      background: linear-gradient(180deg, #1f1f1f 0%, #0d0d0d 100%);
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    html[data-theme="light"] .phone-wrap {
      background: linear-gradient(180deg, #efe5dc 0%, #d9cec3 100%);
      border-color: rgba(66, 40, 30, 0.12);
    }

    .phone-wrap::before {
      content: "";
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: 124px;
      height: 30px;
      border-radius: 999px;
      background: #050505;
      z-index: 30;
    }

    html[data-theme="light"] .phone-wrap::before { background: #dad0c7; }

    .phone {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border-radius: 42px;
      background: #ffffff;
    }

    .ambient {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 90% 6%, rgba(228, 0, 43, 0.06), transparent 20%);
      z-index: 1;
    }

    .status-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 25;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 22px 0;
      height: 52px;
      color: rgba(35, 24, 21, 0.86);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .viewport {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .ocb {
      flex-shrink: 0;
      background: #ffffff;
      display: flex;
      align-items: center;
      padding: 58px 18px 14px;
      gap: 0;
      border-bottom: 1px solid rgba(0, 0, 0, 0.10);
    }

    .ocb-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: transparent;
      border: 0;
      padding: 0;
      cursor: pointer;
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 900;
      font-style: italic;
      color: #231815;
      border-bottom: 1.5px solid rgba(35, 24, 21, 0.75);
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ocb-btn:first-child {
      flex: 1 1 auto;
      min-width: 0;
    }

    .ocb-btn:last-child { flex-shrink: 0; }

    .ocb-btn svg {
      flex-shrink: 0;
      opacity: 0.75;
    }

    .ocb-sep {
      width: 1px;
      height: 14px;
      background: rgba(35, 24, 21, 0.20);
      margin: 0 14px;
      flex-shrink: 0;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: 18px 18px 0;
      background: #ffffff;
      color: #231815;
      scrollbar-width: thin;
      scrollbar-color: rgba(35,24,21,0.18) transparent;
    }

    .content::-webkit-scrollbar { width: 4px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: rgba(35,24,21,0.18); border-radius: 999px; }

    .pay-footer {
      flex-shrink: 0;
      background: #000000;
      padding: 16px 16px 18px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .pay-footer__amount-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }

    .pay-footer__label {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 700;
      font-style: italic;
      color: rgba(255, 255, 255, 0.72);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .pay-footer__value {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 900;
      font-style: italic;
      color: #ffffff;
      text-transform: uppercase;
      line-height: 1;
    }

    .pay-btn {
      width: 100%;
      min-height: 52px;
      background: var(--red);
      color: #ffffff;
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 900;
      font-style: italic;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-radius: 18px;
      transition: filter 0.15s var(--ease), transform 0.15s var(--ease);
    }

    .pay-btn:active {
      filter: brightness(0.9);
      transform: scale(0.98);
    }

    .home-indicator {
      flex-shrink: 0;
      height: 22px;
      background: #000000;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .home-indicator__pill {
      width: 134px;
      height: 5px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.26);
      margin-top: 6px;
    }

    .theme-toggle {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 100;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      transition: background 0.2s, transform 0.2s;
    }

    .theme-toggle:hover { background: rgba(255,255,255,0.2); transform: scale(1.08); }

    html[data-theme="light"] .theme-toggle {
      background: rgba(35, 24, 21, 0.1);
      border-color: rgba(35, 24, 21, 0.18);
    }

  </style>
</head>
<body>

<div class="stage">
  <div class="phone-wrap">
    <div class="phone">
      <div class="ambient"></div>

      <div class="status-bar">
        <span>9:41</span>
        <span>5G ▰▰▰ 🔋</span>
      </div>

      <div class="viewport">

        <div class="ocb">
          <button class="ocb-btn">
            Pick Up: KFC Elizabeth Street Melbourne
            <svg width="10" height="6" viewBox="0 0 10 6" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <span class="ocb-sep"></span>
          <button class="ocb-btn">
            10:00AM
            <svg width="10" height="6" viewBox="0 0 10 6" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>

        <main class="content" id="content">
          <!-- ↓  YOUR CONTENT HERE  ↓ -->
        </main>

        <div class="pay-footer">
          <div class="pay-footer__amount-row">
            <span class="pay-footer__label">Amount</span>
            <span class="pay-footer__value">$XX.XX</span>
          </div>
          <button class="pay-btn">Pay Now</button>
        </div>

        <div class="home-indicator">
          <div class="home-indicator__pill"></div>
        </div>

      </div>
    </div>
  </div>
</div>

<button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">🌓</button>

<script>
  const toggle = document.getElementById("theme-toggle");
  toggle.addEventListener("click", () => {
    const html = document.documentElement;
    html.dataset.theme = html.dataset.theme === "light" ? "dark" : "light";
    toggle.textContent = html.dataset.theme === "light" ? "🌙" : "🌓";
  });
</script>

</body>
</html>
